app:
  base-url: http://localhost:8080

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/linksdb
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 70
      minimum-idle: 30
      idle-timeout: 20000
      connection-timeout: 10000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop

    properties:
      hibernate:
        generate_statistics: true


management:
  endpoints:
    web:
      exposure:
        include: metrics,health,info,prometheus


  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    org:
      hibernate:
        stat: DEBUG